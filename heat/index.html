<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #1b1b2f, #0f0f1a);
        touch-action: none;
    }

    .heart {
        position: absolute;
        width: 22px;
        height: 22px;
        background: red;
        transform: rotate(45deg);
        pointer-events: none;
    }

    .heart::before,
    .heart::after {
        content: "";
        position: absolute;
        width: 22px;
        height: 22px;
        background: inherit;
        border-radius: 50%;
    }

    .heart::before {
        top: -11px;
        left: 0;
    }

    .heart::after {
        left: -11px;
        top: 0;
    }
</style>
</head>
<body>

<script>
let holdTimer = null;
let holdTriggered = false;
let holdX = 0;
let holdY = 0;

function createHeart(x, y, vx, vy, sizeMultiplier = 1) {
    const heart = document.createElement("div");
    heart.className = "heart";

    const size = 20 * sizeMultiplier;
    heart.style.width = size + "px";
    heart.style.height = size + "px";

    heart.style.left = x + "px";
    heart.style.top = y + "px";
    heart.style.background = `hsl(${Math.random()*360}, 80%, 60%)`;

    document.body.appendChild(heart);

    let posX = x;
    let posY = y;
    let velocityX = vx;
    let velocityY = vy;
    let gravity = 0.15;
    let rotation = 45;
    let opacity = 1;

    function animate() {
        velocityY += gravity;
        posX += velocityX;
        posY += velocityY;

        rotation += velocityX * 2;
        opacity -= 0.01;

        heart.style.left = posX + "px";
        heart.style.top = posY + "px";
        heart.style.transform = `rotate(${rotation}deg)`;
        heart.style.opacity = opacity;

        if (opacity <= 0) {
            heart.remove();
        } else {
            requestAnimationFrame(animate);
        }
    }

    requestAnimationFrame(animate);
}

function explode(x, y) {
    for (let i = 0; i < 25; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed - 2;
        createHeart(x, y, vx, vy, Math.random() * 0.8 + 0.7);
    }
}

function singleHeart(x, y) {
    const vx = (Math.random() - 0.5) * 2;
    const vy = -4 - Math.random() * 2;
    createHeart(x, y, vx, vy, 1);
}

function startHold(x, y) {
    holdTriggered = false;
    holdX = x;
    holdY = y;

    holdTimer = setTimeout(() => {
        holdTriggered = true;
        explode(holdX, holdY);
    }, 3000);
}

function endHold(x, y) {
    clearTimeout(holdTimer);
    if (!holdTriggered) {
        singleHeart(x, y);
    }
}

document.addEventListener("mousedown", e => startHold(e.clientX, e.clientY));
document.addEventListener("mouseup", e => endHold(e.clientX, e.clientY));

document.addEventListener("touchstart", e => {
    const touch = e.touches[0];
    startHold(touch.clientX, touch.clientY);
});

document.addEventListener("touchend", e => {
    endHold(holdX, holdY);
});
</script>

</body>
</html>
